; ============================================================
; Satisfactory Splunk Exporter - Configuration File
; ============================================================
;
; Edit this file to configure your Splunk connection, then
; restart Satisfactory for the changes to take effect.
;
; Lines starting with ; are comments and are ignored.
; ============================================================

[/Script/SatisfactorySplunkMod.SplunkModSettings]

; ------------------------------------------------------------
; REQUIRED: Splunk Connection
; ------------------------------------------------------------

; Your Splunk HTTP Event Collector (HEC) endpoint URL.
; Examples:
;   https://splunk.mycompany.com:8088/services/collector
;   https://inputs.yoursplunk.com:8088/services/collector
;   http://192.168.1.50:8088/services/collector
SplunkURL=https://your-splunk-instance:8088/services/collector

; Your Splunk HEC authentication token.
; Generate one in Splunk: Settings > Data Inputs > HTTP Event Collector > New Token
HECToken=your-hec-token-here

; ------------------------------------------------------------
; Collection Mode
; ------------------------------------------------------------

; True  = Metrics mode: fast aggregated factory totals every second (recommended)
;         One event/second with power totals, machine counts, efficiency averages, etc.
; False = Events mode: detailed per-machine data on independent timers (see below)
;         Each data type collects on its own schedule so power can update every 2s
;         while players only update every 30s.
bUseMetricsMode=True

; ------------------------------------------------------------
; Metrics Mode Settings  (only used when bUseMetricsMode=True)
; ------------------------------------------------------------

; How often to collect and send aggregated metrics, in seconds (default: 1.0)
MetricsInterval=1.0

; How often to flush the data buffer to Splunk, in seconds (default: 1.0)
BufferFlushInterval=1.0

; ------------------------------------------------------------
; Events Mode - Collection Intervals  (only used when bUseMetricsMode=False)
;
; Each data type runs on its own independent timer.
; Set a type to False below to disable it entirely.
;
; Guideline:
;   Power      - keep low (2-5s).  Brownouts and overloads happen fast.
;   Production - medium (10-30s). Efficiency changes slowly.
;   Vehicles   - medium (5-15s).  Fuel/cargo changes at a moderate rate.
;   Players    - high (30-60s).   Position data is low priority.
; ------------------------------------------------------------

; Power generator data: how often in seconds (default: 2.0)
PowerCollectionInterval=2.0

; Manufacturer and extractor data: how often in seconds (default: 10.0)
ProductionCollectionInterval=10.0

; Wheeled vehicles and trains: how often in seconds (default: 5.0)
VehicleCollectionInterval=5.0

; Player position and equipment: how often in seconds (default: 30.0)
PlayerCollectionInterval=30.0

; How often to flush the buffer to Splunk in events mode, in seconds (default: 5.0)
; Should be <= the shortest interval above (PowerCollectionInterval)
LegacyBufferFlushInterval=5.0

; Number of events to buffer before forcing an early flush (default: 10)
BatchSize=10

; What data types to collect - set False to disable any type entirely
bCollectPowerData=True
bCollectProductionData=True
bCollectVehicleData=True
bCollectPlayerData=True

; WARNING: Layout data snapshots ALL buildings and can produce very large payloads.
; Only enable this if you specifically need factory layout data in Splunk.
bCollectLayoutData=False
