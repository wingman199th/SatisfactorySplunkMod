; ============================================================
; Satisfactory Splunk Exporter - Configuration File
; ============================================================
;
; Edit this file, then restart Satisfactory for changes to
; take effect. Lines starting with ; are comments.
; ============================================================

[/Script/SatisfactorySplunkMod.SplunkModSettings]

; ------------------------------------------------------------
; REQUIRED: Splunk Connection
; ------------------------------------------------------------

SplunkURL=https://your-splunk-instance:8088/services/collector
HECToken=your-hec-token-here

; ------------------------------------------------------------
; Collection Mode
; ------------------------------------------------------------

; True  = Metrics mode: fast aggregated totals (recommended)
;         Sends compact totals: power MW, machine counts, efficiency %
; False = Events mode: detailed per-machine data
;         Sends one event per machine/vehicle/player with full detail
bUseMetricsMode=True

; ------------------------------------------------------------
; Collection Intervals (seconds)
;
; These apply to BOTH metrics mode and events mode.
; Each data type runs on its own independent timer so you can
; collect power every 2 seconds without hammering Splunk with
; player data at the same rate.
;
; Recommended ranges:
;   Power      1-5s    brownouts and overloads need fast detection
;   Production 10-30s  efficiency changes slowly
;   Vehicles   5-15s   fuel and cargo change at a moderate pace
;   Players    30-60s  low-priority positional data
; ------------------------------------------------------------

; How often to collect power data (seconds)
PowerInterval=2

; How often to collect production machine data (seconds)
ProductionInterval=10

; How often to collect vehicle (trucks + trains) data (seconds)
VehicleInterval=5

; How often to collect player data (seconds)
PlayerInterval=30

; How often to flush the data buffer and send to Splunk (seconds)
; Should be <= PowerInterval so power data isn't sitting in the buffer
BufferFlushInterval=5

; ------------------------------------------------------------
; What to collect - set False to disable a type entirely
; ------------------------------------------------------------

bCollectPowerData=True
bCollectProductionData=True
bCollectVehicleData=True
bCollectPlayerData=True

; WARNING: Layout data snapshots ALL buildings - can produce very
; large payloads. Only enable if you need factory layout in Splunk.
; Events mode only - not available in metrics mode.
bCollectLayoutData=False

; ------------------------------------------------------------
; Events Mode Only
; ------------------------------------------------------------

; Buffer this many events before forcing an early flush to Splunk
BatchSize=10
